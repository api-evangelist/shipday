aid: shipday
url: https://raw.githubusercontent.com/api-evangelist/shipday/refs/heads/main/apis.yml
name: Shipday
kind: company
description: Shipday is a local delivery management platform for restaurants, retailers,
  and on-demand businesses. Its REST API lets you create and track delivery and pickup
  orders, manage drivers (carriers), assign orders to your own fleet, and tap a network
  of on-demand delivery providers (Uber, DoorDash) for last-mile fulfillment, with
  webhooks for real-time order and driver-location updates.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Delivery
- Logistics
- Last Mile
- Local Delivery
- Dispatch
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
apis:
- aid: shipday:orders
  name: Shipday Orders API
  tags:
  - Orders
  - Deliveries
  - Pickup
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.shipday.com/reference/shipday-api
  baseURL: https://api.shipday.com
  properties:
