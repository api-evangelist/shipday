  humanURL: https://docs.shipday.com/reference/assign-order
  baseURL: https://api.shipday.com
  properties:
  - url: https://docs.shipday.com/reference/assign-order
    type: Documentation
  - url: https://docs.shipday.com/reference/unassign-order-from-driver-1
    type: APIReference
  - url: openapi/shipday-openapi.yml
    type: OpenAPI
  - url: collections/shipday.postman_collection.json
    type: PostmanCollection
  - url: collections/shipday.opencollection.json
    type: OpenCollection
  description: Assign an order to a specific carrier in your own fleet by order ID
    and carrier ID, and unassign an order from a driver when dispatch changes.
- aid: shipday:on-demand-delivery
  name: Shipday On-Demand Delivery API
  tags:
