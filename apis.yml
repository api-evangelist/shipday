    type: Documentation
  - url: https://docs.shipday.com/reference/shipday-api
    type: APIReference
  - url: openapi/shipday-openapi.yml
    type: OpenAPI
  - url: collections/shipday.postman_collection.json
    type: PostmanCollection
  - url: collections/shipday.opencollection.json
    type: OpenCollection
  description: Create, list, edit, and delete delivery and pickup orders. Insert a
    delivery order with customer, restaurant/pickup, and cost details; retrieve active
    orders; edit an existing order by ID; and manage pickup orders.
- aid: shipday:drivers-carriers
  name: Shipday Drivers / Carriers API
  tags:
  - Drivers
  - Carriers
  - Fleet
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.shipday.com/reference/add-a-carrier-1
  baseURL: https://api.shipday.com
  properties:
