    type: Documentation
  - url: https://docs.shipday.com/reference/retrieve-carriers
    type: APIReference
  - url: openapi/shipday-openapi.yml
    type: OpenAPI
  - url: collections/shipday.postman_collection.json
    type: PostmanCollection
  - url: collections/shipday.opencollection.json
    type: OpenCollection
  description: Add carriers (drivers) to your account, retrieve your carrier roster,
    and remove carriers. Adding a carrier returns an auto-generated password for the
    driver app login.
- aid: shipday:order-assignment
  name: Shipday Order Assignment API
  tags:
