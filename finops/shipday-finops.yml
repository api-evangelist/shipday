- Local Delivery
- Dispatch
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Shipday spend. Shipday bills a recurring monthly subscription
  per plan (Starter free, Professional, Branded Elite, Business Advanced), a
  per-order overage fee (inclusive of SMS) once an account exceeds its monthly
  order allotment, and pass-through per-delivery fees for third-party
  on-demand deliveries (Uber, DoorDash). Drivers are not billed per seat.
notes: >-
  Subscription prices, order allotments, overage rates, and on-demand fees are
  subject to change and vary by region; verify against the Shipday pricing
  page during reconciliation.
sources:
- https://www.shipday.com/pricing
- https://docs.shipday.com
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Shipday
serviceCategory: Logistics and Delivery Management
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Shipday Delivery Management
  ServiceCategory: Logistics and Delivery Management
  ProviderName: Shipday
  PublisherName: Shipday
  InvoiceIssuerName: Shipday
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Subscription-Based
meters:
- name: plan_subscription
  description: Recurring monthly plan subscription fee per tier.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: orders_included
  description: Orders consumed within the plan's monthly allotment at no marginal cost.
  unit: orders
  aggregation: sum
  dimensions:
  - account
  - plan
- name: order_overage
  description: Orders beyond the monthly allotment billed per order (inclusive of SMS), region-dependent.
  unit: orders
  aggregation: sum
  dimensions:
  - account
  - region
- name: on_demand_delivery_fee
  description: Pass-through per-delivery fee for third-party on-demand providers (Uber, DoorDash).
  unit: deliveries
  aggregation: sum
  dimensions:
  - account
  - provider
principles:
- name: Visibility
  description: Track monthly subscription, order volume vs. allotment, and on-demand delivery spend per account.
- name: Allocation
  description: Tag orders by store/location, order source, and provider to map delivery spend to cost centers.
- name: Optimization
  description: Right-size the plan to actual order volume, dispatch to owned fleet when cheaper than on-demand, and compare provider quotes from the availability endpoint before assigning.
- name: Accountability
  description: Assign owners per location; review order overage and on-demand fees monthly against budget.
maintainers:
